name: Tests and Examples

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - '.github/workflows/testing.yml'
      - 'environment.yml'
      - 'pyproject.toml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - '.github/workflows/testing.yml'
      - 'environment.yml'
      - 'pyproject.toml'
  schedule:
    - cron: '0 0 * * *'  # Every day at 00:00 UTC

jobs:
  test:
    name: Run Tests and Examples
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    strategy:
      matrix:
        os: [ubuntu-latest] #, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e . --group dev

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: |
          uv run pytest tests --cov=src --cov-report=xml --cov-report=term

      - name: Run tests on macOS
        if: runner.os == 'macOS'
        run: |
          uv run pytest tests

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          uv run pytest tests

      - name: Run examples on Unix
        if: runner.os != 'Windows'
        run: |
          cd examples
          uv run bash run_examples.sh

      - name: Run examples on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cd examples
          uv run run_examples.bat

      - name: Upload coverage to Codecov (Linux and python 3.11 only)
        if: runner.os == 'Linux' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: PLAID-lib/plaid
          name: python-${{ matrix.python-version }}
          verbose: true
