name: Documentation

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 0 * * *'  # Every day at 00:00 UTC

permissions:
  contents: read

jobs:
  doc:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --dev --extra viewer

      - name: Check API reference is in sync with src/plaid
        run: |
          uv run python docs/generate_api_stubs.py
          if ! git diff --exit-code -- docs/source/api docs/zensical.toml; then
            echo "::error::API reference is out of date. Run 'python docs/generate_api_stubs.py' and commit the result." >&2
            exit 1
          fi

      - name: Compile documentation
        run: |
          cd docs
          uv run bash generate_doc.sh
