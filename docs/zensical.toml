[project.plugins.mkdocstrings.config]
default_handler = "python"

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["../src"]

[project.plugins.mkdocstrings.config.handlers.python.options]
# --- structure / navigation ---
group_by_category = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_root_toc_entry = true
heading_level = 2

# --- what is shown for each object ---
docstring_style = "google"
docstring_section_style = "list"
show_source = true
show_bases = false
show_signature = true
show_signature_annotations = false
separate_signature = true
show_root_heading = true
show_attributes = true

# --- display module path / imports ---
show_root_full_path = true
show_object_full_path = true
show_if_no_docstring = false

# --- ordering and style ---
# Render members inherited via base classes. ``Sample`` declares itself
# (inside a ``TYPE_CHECKING`` block in ``plaid.containers.sample``) as
# inheriting from ``SampleFeatures`` so that the public methods delegated
# at runtime by ``@delegate_methods("features", SampleFeatures)`` show up
# on its documentation page. Without this, the ``Sample`` page would only
# list the few methods literally defined inside ``class Sample`` and hide
# most of the actual API surface a user calls on a sample.
inherited_members = true
members_order = "source"
merge_init_into_class = true

[project.theme]
favicon = "images/plaid_logo.png"
logo = "images/plaid_logo.png"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/PLAID-lib/plaid"
name = "PLAID on GitHub"

[[project.extra.social]]
icon = "simple/pypi"
link = "https://pypi.org/project/pyplaid/"
name = "pyplaid on PyPI"

[[project.extra.social]]
icon = "simple/anaconda"
link = "https://anaconda.org/conda-forge/plaid"
name = "plaid on conda-forge"

[project.validation]
# Notebook text outputs contain CGNS tree dumps with square brackets (e.g.
# ``[1 2 3]``) that are valid rendered content but look like reference-style
# Markdown links to the validator. Keep the build quiet while preserving those
# outputs verbatim in the generated documentation.
unresolved_references = false
