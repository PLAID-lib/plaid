version: 2

sphinx:
  configuration: docs/conf.py

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

  jobs:
    post_checkout:
      - git fetch origin --unshallow || true

    post_create_environment:
      - python -m pip install --upgrade pip
      - python -m pip install uv

    post_install:
      # Export locked dependencies from uv
      - uv export --frozen --group dev --format requirements-txt --no-hashes > /tmp/requirements.txt

      # Install INTO the RTD environment (critical)
      - uv pip install --system -r /tmp/requirements.txt

      # Install project itself
      - uv pip install --system -e .

      # Debug safety check
      - python -c "import sys; print('Sphinx will use:', sys.executable)"
      - python -c "import jupytext; print('jupytext OK')"

python:
  install: []